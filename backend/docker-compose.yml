services:
  api:
    build: .
    container_name: livraria7-api
    ports:
      - "8000:8000"
    volumes:
      - fastapi_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fastapi_data:
